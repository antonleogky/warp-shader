<!DOCTYPE html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warp Shader</title>
  </head>
  <body data-app="warp-shader">
    <div class="app">
      <main class="viewport" id="viewport">
        <div class="viewport-chrome">
          <p class="canvas-meta" id="canvas-meta">1080 × 1080</p>
          <p class="recording-pill" id="recording-pill" hidden>Recording</p>
        </div>
        <canvas id="canvas"></canvas>
        <p class="app-badge" id="app-badge" hidden>warp-shader</p>
      </main>
      <aside id="panel"></aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
